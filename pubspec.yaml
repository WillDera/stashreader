name: stashreader
description: "A hybrid reader + knowledge snippet manager."
publish_to: 'none'
version: 2.1.0+6

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.1
  epubx: ^4.0.0
  http: ^1.3.0
  html: ^0.15.5
  file_picker: ^11.0.2
  shared_preferences: ^2.5.3
  provider: ^6.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  flutter_markdown: ^0.7.6
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.26.0
  build_runner: ^2.4.15
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
